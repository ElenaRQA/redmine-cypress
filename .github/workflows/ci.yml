name: Cypress Tests

on:
  push:
    branches:
      - first_tests
  pull_request:
    branches:
      - main

jobs:
  cypress-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Create .env file
        run: |
          echo "CYPRESS_BASE_URL=https://www.redmine.org" >> .env
          echo "CYPRESS_USER=elenatester" >> .env
          echo "CYPRESS_PASSWORD=elenatester" >> .env

      - name: Load .env variables
        run: cat .env >> $GITHUB_ENV

      - name: Run Cypress tests
        run: npx cypress run --browser chrome